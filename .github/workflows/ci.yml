name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore WindowsProxyServices.sln

      - name: Build
        run: dotnet build WindowsProxyServices.sln --no-restore -c Release

      - name: Publish (win-x64 self-contained)
        shell: pwsh
        run: |
          $pubArgs = @('-c','Release','-r','win-x64','--self-contained','-o',"${{ github.workspace }}\publish")
          dotnet publish src/WindowsProxyService/WindowsProxyService.csproj         @pubArgs
          dotnet publish src/WindowsDashboardService/WindowsDashboardService.csproj @pubArgs
          dotnet publish src/WindowsTrayApp/WindowsTrayApp.csproj                   @pubArgs
          dotnet publish src/WindowsSqlService/WindowsSqlService.csproj             @pubArgs

      - name: Smoke test — verify published output
        shell: pwsh
        run: |
          $required = @(
            'WindowsProxyService.exe',
            'WindowsDashboardService.exe',
            'WindowsTrayApp.exe',
            'WindowsSqlService.exe',
            'services.json'
          )
          foreach ($f in $required) {
            $path = "${{ github.workspace }}\publish\$f"
            if (-not (Test-Path $path)) { throw "$f not found in publish output." }
          }
          $fileCount = (Get-ChildItem "${{ github.workspace }}\publish" -File).Count
          Write-Host "Publish output OK — $fileCount files."

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: published-app-${{ github.run_number }}
          path: publish/
          retention-days: 3
