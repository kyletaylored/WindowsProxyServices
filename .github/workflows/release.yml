name: Release

# Triggered automatically by a semver tag push:
#   git tag v1.2.3 && git push --tags
#
# Can also be run manually from the Actions tab to produce a test MSI without
# creating a release.  Leave the version blank to get 0.0.0-dev.<run number>.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.2.3 or 1.2.3-beta1). Leave blank for a dev build.'
        required: false
        default: ''

permissions:
  contents: write   # needed to create the GitHub Release

jobs:

  # ── 1. Resolve version ───────────────────────────────────────────────────
  #
  # Runs on Linux (fast/cheap) and exports semver + MSI version strings
  # as job outputs consumed by every downstream job.
  # ─────────────────────────────────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      semver:      ${{ steps.ver.outputs.SEMVER }}
      msi_version: ${{ steps.ver.outputs.MSI_VERSION }}
      msi_name:    ${{ steps.ver.outputs.MSI_NAME }}

    steps:
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $raw    = "${{ inputs.version }}"
            $semver = if ($raw) { $raw.TrimStart('v') } else { "0.0.0-dev.${{ github.run_number }}" }
          } else {
            $semver = "${{ github.ref_name }}".TrimStart('v')
          }

          # MSI ProductVersion must be X.Y.Z — strip any pre-release suffix
          $parts  = ($semver -split '-')[0].Split('.')
          while ($parts.Count -lt 3) { $parts += '0' }
          $msiVer  = $parts[0..2] -join '.'
          $msiName = "WindowsProxyServices-$semver.msi"

          echo "SEMVER=$semver"       >> $env:GITHUB_OUTPUT
          echo "MSI_VERSION=$msiVer" >> $env:GITHUB_OUTPUT
          echo "MSI_NAME=$msiName"   >> $env:GITHUB_OUTPUT
          Write-Host "Semver: $semver  |  MSI version: $msiVer"


  # ── 2. Build & package ───────────────────────────────────────────────────
  #
  # Compiles all three projects, generates the dynamic Files.wxs fragment,
  # and produces the final MSI.  Uploads the MSI as a workflow artifact so
  # subsequent jobs can download it without rebuilding.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    needs: version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX Toolset v4
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add WixToolset.UI.wixext/4.0.5

      - name: Restore & Publish
        shell: pwsh
        run: |
          dotnet restore WindowsProxyServices.sln

          $pubArgs = @(
            '-c', 'Release',
            '-r', 'win-x64',
            '--self-contained',
            "-p:AssemblyVersion=${{ needs.version.outputs.msi_version }}",
            '-o', "${{ github.workspace }}\publish"
          )

          dotnet publish src/WindowsProxyService/WindowsProxyService.csproj       @pubArgs
          dotnet publish src/WindowsDashboardService/WindowsDashboardService.csproj @pubArgs
          dotnet publish src/WindowsTrayApp/WindowsTrayApp.csproj                 @pubArgs

      - name: Generate WiX file fragment
        shell: pwsh
        run: |
          $publishDir = "${{ github.workspace }}\publish"
          $outputFile = "${{ github.workspace }}\installer\Files.wxs"

          $md5 = [System.Security.Cryptography.MD5]::Create()
          function Get-FileGuid([string]$name) {
            $bytes = [System.Text.Encoding]::UTF8.GetBytes("WindowsProxyServices:$name")
            $hash  = $md5.ComputeHash($bytes)
            return [System.Guid]::new($hash).ToString('D').ToUpper()
          }

          $excludedExes = @(
            'WindowsProxyService.exe',
            'WindowsDashboardService.exe',
            'WindowsTrayApp.exe'
          )

          $allFiles  = Get-ChildItem -Path $publishDir -File -Recurse |
                       Where-Object { $_.Name -notin $excludedExes }
          $rootFiles = $allFiles | Where-Object { $_.DirectoryName -eq $publishDir }
          $subFiles  = $allFiles | Where-Object { $_.DirectoryName -ne $publishDir }
          $subDirs   = $subFiles |
                       ForEach-Object { $_.DirectoryName.Substring($publishDir.Length).TrimStart('\') } |
                       Sort-Object -Unique

          $sb = [System.Text.StringBuilder]::new()
          $sb.AppendLine('<?xml version="1.0" encoding="UTF-8"?>') | Out-Null
          $sb.AppendLine('<Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">') | Out-Null
          $sb.AppendLine('  <Fragment>') | Out-Null

          foreach ($dir in $subDirs) {
            $dirId   = 'Dir_' + ($dir -replace '[^a-zA-Z0-9]', '_')
            $dirName = Split-Path $dir -Leaf
            $sb.AppendLine("    <DirectoryRef Id=""INSTALLFOLDER"">") | Out-Null
            $sb.AppendLine("      <Directory Id=""$dirId"" Name=""$dirName"" />") | Out-Null
            $sb.AppendLine("    </DirectoryRef>") | Out-Null
          }

          $sb.AppendLine('    <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">') | Out-Null
          foreach ($file in $rootFiles) {
            $id   = 'f_' + ($file.Name -replace '[^a-zA-Z0-9]', '_')
            $guid = Get-FileGuid $file.Name
            $src  = $file.FullName
            $sb.AppendLine("      <Component Id=""$id"" Guid=""$guid"">") | Out-Null
            $sb.AppendLine("        <File Id=""$id"" Source=""$src"" KeyPath=""yes"" />") | Out-Null
            $sb.AppendLine("      </Component>") | Out-Null
          }

          foreach ($file in $subFiles) {
            $relDir = $file.DirectoryName.Substring($publishDir.Length).TrimStart('\')
            $dirId  = 'Dir_' + ($relDir -replace '[^a-zA-Z0-9]', '_')
            $relKey = "$relDir\$($file.Name)"
            $id     = 'f_' + ($relKey -replace '[^a-zA-Z0-9]', '_')
            $guid   = Get-FileGuid $relKey
            $src    = $file.FullName
            $sb.AppendLine("      <Component Id=""$id"" Guid=""$guid"" Directory=""$dirId"">") | Out-Null
            $sb.AppendLine("        <File Id=""$id"" Source=""$src"" KeyPath=""yes"" />") | Out-Null
            $sb.AppendLine("      </Component>") | Out-Null
          }

          $sb.AppendLine('    </ComponentGroup>') | Out-Null
          $sb.AppendLine('  </Fragment>') | Out-Null
          $sb.AppendLine('</Wix>') | Out-Null

          [System.IO.File]::WriteAllText($outputFile, $sb.ToString(), [System.Text.Encoding]::UTF8)
          Write-Host "Generated Files.wxs with $($allFiles.Count) file components ($($rootFiles.Count) root, $($subFiles.Count) in subdirs)."

      - name: Build MSI
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $msiName = "${{ needs.version.outputs.msi_name }}"
          $msiVer  = "${{ needs.version.outputs.msi_version }}"
          $pubDir  = "${{ github.workspace }}\publish"

          wix build `
            installer\Product.wxs `
            installer\Services.wxs `
            installer\Files.wxs `
            installer\RumConfigDlg.wxs `
            -arch x64 `
            -d "Version=$msiVer" `
            -d "Manufacturer=Kyle Taylor" `
            -d "PublishDir=$pubDir" `
            -ext WixToolset.UI.wixext `
            -o "installer\$msiName"

          Write-Host "MSI built: installer\$msiName"

      - name: Sign MSI
        # Skipped gracefully when SIGNING_CERT_PFX is not configured.
        # Set two repo/org secrets to enable:
        #   SIGNING_CERT_PFX      – base64-encoded PFX (private + public cert)
        #   SIGNING_CERT_PASSWORD – password used when the PFX was exported
        shell: pwsh
        env:
          SIGNING_CERT_PFX:      ${{ secrets.SIGNING_CERT_PFX }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          if (-not $env:SIGNING_CERT_PFX) {
            Write-Host "SIGNING_CERT_PFX not configured — MSI will be unsigned."
            exit 0
          }
          $ErrorActionPreference = 'Stop'
          $msiPath = "installer\${{ needs.version.outputs.msi_name }}"

          # Decode PFX to a temp file (never touches the workspace)
          $pfxPath = Join-Path $env:TEMP "signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_CERT_PFX))

          try {
            # Export the public .cer so it can be bundled with the release download.
            # The private key stays in the temp PFX and is deleted below.
            $secPwd = ConvertTo-SecureString $env:SIGNING_CERT_PASSWORD -AsPlainText -Force
            $cert   = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($pfxPath, $secPwd)
            [IO.File]::WriteAllBytes(
              "installer\WindowsProxyServices.cer",
              $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert)
            )
            Write-Host "Certificate: $($cert.Subject)  valid until $($cert.NotAfter.ToString('yyyy-MM-dd'))"

            # Locate signtool.exe from the Windows SDK (x64 variant)
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
              -Recurse -Filter signtool.exe |
              Where-Object { $_.FullName -like '*x64*' } |
              Sort-Object FullName | Select-Object -Last 1 -ExpandProperty FullName
            if (-not $signtool) { throw "signtool.exe not found in Windows SDK." }

            & $signtool sign /fd SHA256 /f $pfxPath /p $env:SIGNING_CERT_PASSWORD $msiPath
            if ($LASTEXITCODE -ne 0) { throw "signtool sign failed (exit $LASTEXITCODE)." }

            & $signtool verify /pa $msiPath
            if ($LASTEXITCODE -ne 0) { throw "signtool verify failed." }

            Write-Host "Signed and verified: $msiPath"
          } finally {
            Remove-Item $pfxPath -Force -ErrorAction SilentlyContinue
          }

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: msi-${{ needs.version.outputs.semver }}
          # WindowsProxyServices.cer is only present when signing is configured;
          # if-no-files-found: warn avoids failing when it is absent.
          path: |
            installer/${{ needs.version.outputs.msi_name }}
            installer/WindowsProxyServices.cer
          if-no-files-found: warn
          retention-days: 14


  # ── 3. Smoke test ────────────────────────────────────────────────────────
  #
  # Installs the MSI on a fresh Windows runner, waits for all six services
  # to reach Running state, probes each HTTP endpoint, then uninstalls.
  # Installer logs are uploaded as artifacts on failure for easy debugging.
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    needs: [version, build]
    runs-on: windows-latest
    environment:
      name: smoke-test

    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v8
        with:
          name: msi-${{ needs.version.outputs.semver }}
          path: installer

      - name: Trust signing certificate
        # Import the public cert so Windows recognises the publisher during install.
        # Silently skipped if the build was unsigned (no .cer in the artifact).
        shell: pwsh
        run: |
          $cerPath = "installer\WindowsProxyServices.cer"
          if (Test-Path $cerPath) {
            Import-Certificate -FilePath $cerPath -CertStoreLocation Cert:\LocalMachine\TrustedPublisher
            $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($cerPath)
            Write-Host "Imported: $($cert.Subject)"
          } else {
            Write-Host "No certificate in artifact — unsigned build, skipping trust step."
          }

      - name: Install MSI
        # /qn  = silent (no UI); WIXUI_EXITDIALOGOPTIONALCHECKBOX=0 suppresses
        # the tray-app launch that would otherwise fire from the default property.
        #
        # RUM values are passed as MSI properties so they travel through the same
        # registry path that the installer dialog uses for interactive installs.
        # Set secrets DD_RUM_APP_ID / DD_RUM_CLIENT_TOKEN and vars DD_RUM_SITE /
        # DD_RUM_ENV in repo/org settings to exercise the RUM code path in CI.
        shell: pwsh
        env:
          DD_RUM_APP_ID:       ${{ secrets.DD_RUM_APP_ID }}
          DD_RUM_CLIENT_TOKEN: ${{ secrets.DD_RUM_CLIENT_TOKEN }}
          DD_RUM_SITE:         ${{ vars.DD_RUM_SITE }}
          DD_RUM_ENV:          ${{ vars.DD_RUM_ENV }}
        run: |
          $msi      = "installer\${{ needs.version.outputs.msi_name }}"
          $rumProps = ""
          if ($env:DD_RUM_APP_ID) {
            $site     = if ($env:DD_RUM_SITE) { $env:DD_RUM_SITE } else { 'datadoghq.com' }
            $rumEnv   = if ($env:DD_RUM_ENV)  { $env:DD_RUM_ENV  } else { 'ci' }
            $rumProps = " DD_RUM_APP_ID=`"$($env:DD_RUM_APP_ID)`"" +
                        " DD_RUM_CLIENT_TOKEN=`"$($env:DD_RUM_CLIENT_TOKEN)`"" +
                        " DD_RUM_SITE=`"$site`"" +
                        " DD_RUM_ENV=`"$rumEnv`""
            Write-Host "RUM properties will be passed to installer (site: $site, env: $rumEnv)."
          } else {
            Write-Host "DD_RUM_APP_ID not set — installing without RUM (window.DD_RUM check will be skipped)."
          }
          $msiArgs = "/i `"$msi`" /qn /l*v install.log WIXUI_EXITDIALOGOPTIONALCHECKBOX=0$rumProps"
          $proc    = Start-Process msiexec -ArgumentList $msiArgs -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Host "--- Last 50 lines of install.log ---"
            Get-Content install.log -ErrorAction SilentlyContinue | Select-Object -Last 50
            exit $proc.ExitCode
          }

      - name: Wait for services to reach Running state
        shell: pwsh
        run: |
          $services = @(
            'WindowsProxyService.OpenMeteo',
            'WindowsProxyService.CatFacts',
            'WindowsProxyService.JsonPlaceholder',
            'WindowsProxyService.DogCeo',
            'WindowsProxyService.ChuckNorris',
            'WindowsDashboardService'
          )
          foreach ($svc in $services) {
            $deadline = [DateTime]::UtcNow.AddSeconds(60)
            do {
              $status = (Get-Service -Name $svc -ErrorAction SilentlyContinue)?.Status
              if ($status -eq 'Running') { break }
              Start-Sleep -Seconds 3
            } while ([DateTime]::UtcNow -lt $deadline)

            $final = (Get-Service -Name $svc -ErrorAction SilentlyContinue)?.Status
            if ($final -ne 'Running') {
              Write-Error "Service '$svc' did not reach Running state (status: $final)"
              # Dump recent Application event log entries to help diagnose
              Get-WinEvent -LogName Application -MaxEvents 30 -ErrorAction SilentlyContinue |
                Where-Object { $_.Message -match 'WindowsProxy|WindowsDashboard' } |
                Format-List TimeCreated, Id, LevelDisplayName, Message | Out-String | Write-Host
              exit 1
            }
            Write-Host "OK  $svc"
          }

      - name: Test HTTP endpoints
        shell: pwsh
        run: |
          $tests = @(
            @{ Url = 'http://localhost:5051/api/services'; Desc = 'Dashboard – services list'    },
            @{ Url = 'http://localhost:5052/api/status';   Desc = 'OpenMeteo proxy status'       },
            @{ Url = 'http://localhost:5053/api/status';   Desc = 'CatFacts proxy status'        },
            @{ Url = 'http://localhost:5054/api/status';   Desc = 'JsonPlaceholder proxy status' },
            @{ Url = 'http://localhost:5055/api/status';   Desc = 'DogCeo proxy status'          },
            @{ Url = 'http://localhost:5056/api/status';   Desc = 'ChuckNorris proxy status'     }
          )
          $failed = 0
          foreach ($t in $tests) {
            try {
              $resp = Invoke-WebRequest -Uri $t.Url -UseBasicParsing -TimeoutSec 10
              if ($resp.StatusCode -ne 200) { throw "HTTP $($resp.StatusCode)" }
              Write-Host "OK  $($t.Desc)"
            } catch {
              Write-Host "FAIL $($t.Desc) — $_"
              $failed++
            }
          }
          if ($failed -gt 0) { exit 1 }

      - name: Install Playwright
        shell: pwsh
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run browser smoke test
        shell: pwsh
        run: |
          # Single-quoted here-string — $ is literal, so JS template literals work as-is.
          $js = @'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const rows = [];

          const record = (check, status, detail) => {
            const icon   = status === 'pass' ? '✅' : status === 'fail' ? '❌' : '⏭';
            const label  = status === 'pass' ? 'Pass' : status === 'fail' ? 'Fail' : 'Skipped';
            rows.push(`| ${check} | ${icon} ${label} | ${detail ?? ''} |`);
            const line = `${icon}  ${label.padEnd(7)} ${check}${detail ? ' — ' + detail : ''}`;
            status === 'fail' ? console.error(line) : console.log(line);
          };

          (async () => {
            const browser = await chromium.launch();
            const page    = await browser.newPage();
            let failed = 0;

            try {
              await page.goto('http://localhost:5051', { waitUntil: 'networkidle', timeout: 15000 });

              // Service cards visible
              const cards = await page.locator('.card').count();
              if (cards > 0) record('Service cards rendered', 'pass', `${cards} cards`);
              else           { record('Service cards rendered', 'fail', 'no cards found'); failed++; }

              // rum-config.json served and parseable
              const resp = await page.request.get('http://localhost:5051/rum-config.json');
              if (!resp.ok()) {
                record('rum-config.json served', 'fail', `HTTP ${resp.status()}`);
                failed++;
              } else {
                let cfg;
                try {
                  cfg = await resp.json();
                  record('rum-config.json valid JSON', 'pass', null);
                } catch {
                  record('rum-config.json valid JSON', 'fail', 'parse error');
                  failed++;
                }

                if (cfg) {
                  if (cfg.applicationId) {
                    // DD_RUM stub is set synchronously by the loader IIFE once
                    // the fetch resolves; networkidle guarantees it ran already.
                    const rumType = await page.evaluate(() => typeof window.DD_RUM);
                    if (rumType !== 'undefined')
                      record('window.DD_RUM initialised', 'pass', `site: ${cfg.site}`);
                    else {
                      record('window.DD_RUM initialised', 'fail', 'missing despite applicationId being set');
                      failed++;
                    }
                  } else {
                    record('window.DD_RUM initialised', 'skip', 'applicationId not set in this build');
                  }
                }
              }
            } finally {
              await browser.close();
            }

            // ── GitHub Step Summary ───────────────────────────────────────────
            const passed  = rows.filter(r => r.includes('✅')).length;
            const skipped = rows.filter(r => r.includes('⏭')).length;
            if (summaryPath) {
              const md = [
                '## 🌐 Browser Smoke Test',
                '',
                '| Check | Status | Detail |',
                '|---|---|---|',
                ...rows,
                '',
                `**${passed} passed · ${failed} failed · ${skipped} skipped**`,
              ].join('\n');
              fs.appendFileSync(summaryPath, md + '\n');
            }

            console.log(`\nBrowser smoke: ${passed} passed, ${failed} failed, ${skipped} skipped`);
            if (failed > 0) process.exit(1);
          })();
          '@

          $js | node

      - name: Uninstall MSI
        # Run even if earlier steps failed so we always exercise the uninstaller.
        if: always()
        shell: pwsh
        run: |
          $msi  = "installer\${{ needs.version.outputs.msi_name }}"
          $args = "/x `"$msi`" /qn /l*v uninstall.log"
          $proc = Start-Process msiexec -ArgumentList $args -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Host "--- Last 50 lines of uninstall.log ---"
            Get-Content uninstall.log -ErrorAction SilentlyContinue | Select-Object -Last 50
            exit $proc.ExitCode
          }

      - name: Upload installer logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: installer-logs-${{ needs.version.outputs.semver }}
          path: |
            install.log
            uninstall.log
          retention-days: 7


  # ── 4. Create GitHub Release ─────────────────────────────────────────────
  #
  # Only runs on tag pushes (not workflow_dispatch).  Downloads the already-
  # built MSI from the artifact store — no rebuild needed.
  # ─────────────────────────────────────────────────────────────────────────
  release:
    needs: [version, smoke-test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v8
        with:
          name: msi-${{ needs.version.outputs.semver }}
          path: installer

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Windows Proxy Services ${{ needs.version.outputs.semver }}"
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            installer/${{ needs.version.outputs.msi_name }}
            installer/WindowsProxyServices.cer
