<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Windows Proxy Services</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body         { background: #0d1117; }
    .card        { border-color: #30363d; background: #161b22; }
    .card-header { border-color: #30363d; background: #1c2128; }
    .card-footer { border-color: #30363d; background: #0d1117; }
    pre.response {
      max-height: 260px;
      overflow-y: auto;
      font-size: .78rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .dot-Running  { background: #3fb950; box-shadow: 0 0 5px #3fb950; }
    .dot-Stopped  { background: #f85149; }
    .dot-NotFound { background: #6e7681; }
    .dot-other    { background: #d29922; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar" style="background:#161b22;border-bottom:1px solid #30363d">
  <div class="container-fluid px-4">
    <span class="navbar-brand fw-semibold mb-0">
      <i class="bi bi-router me-2 text-primary"></i>Windows Proxy Services
    </span>
    <div class="d-flex align-items-center gap-3">
      <small id="summary" class="text-muted"></small>
      <small id="last-updated" class="text-muted"></small>
    </div>
  </div>
</nav>

<!-- Cards -->
<div class="container-fluid py-4 px-4">
  <div id="grid" class="row g-3">
    <div class="col-12 text-center py-5">
      <i class="bi bi-arrow-repeat spin fs-3 text-primary d-block mb-3"></i>
      <span class="text-muted">Loading services…</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const POLL_MS = 5000;
const EMOJI = {
  OpenMeteo: '🌤', JsonPlaceholder: '📋', DatadogDemo: '🐶', SqlService: '🗄',
};

// Known endpoint presets per service.
// Each entry: { label, method, path } — path=null means "Custom (free-form)".
const PRESETS = {
  OpenMeteo: [
    { label: 'Current weather — NYC',          method: 'GET', path: '/v1/forecast?latitude=40.71&longitude=-74.01&current_weather=true' },
    { label: 'Hourly temp — Dallas (3 days)',   method: 'GET', path: '/v1/forecast?latitude=32.78&longitude=-96.80&hourly=temperature_2m,windspeed_10m&forecast_days=3&timezone=America%2FChicago' },
    { label: 'Daily forecast — San Francisco',  method: 'GET', path: '/v1/forecast?latitude=37.77&longitude=-122.42&daily=temperature_2m_max,temperature_2m_min&forecast_days=7&timezone=America%2FLos_Angeles' },
    { label: 'Custom…', method: 'GET', path: null },
  ],
  JsonPlaceholder: [
    { label: 'GET  /todos/1',   method: 'GET',  path: '/todos/1' },
    { label: 'GET  /posts',     method: 'GET',  path: '/posts' },
    { label: 'GET  /posts/1',   method: 'GET',  path: '/posts/1' },
    { label: 'GET  /users',     method: 'GET',  path: '/users' },
    { label: 'POST /posts',     method: 'POST', path: '/posts' },
    { label: 'Custom…', method: 'GET', path: null },
  ],
  DatadogDemo: [
    { label: 'GET  /api/lab/health',           method: 'GET',  path: '/api/lab/health' },
    { label: 'GET  /api/lab/slow-query (3s)',  method: 'GET',  path: '/api/lab/slow-query?delay=3000' },
    { label: 'GET  /api/lab/chain',            method: 'GET',  path: '/api/lab/chain' },
    { label: 'GET  /api/lab/handled-error',    method: 'GET',  path: '/api/lab/handled-error' },
    { label: 'GET  /api/lab/runtime-metrics',  method: 'GET',  path: '/api/lab/runtime-metrics' },
    { label: 'POST /api/lab/log-burst',        method: 'POST', path: '/api/lab/log-burst' },
    { label: 'Custom…', method: 'GET', path: null },
  ],
  SqlService: [
    { label: 'GET  /api/status',                 method: 'GET',  path: '/api/status' },
    { label: 'GET  /api/products',               method: 'GET',  path: '/api/products' },
    { label: 'GET  /api/orders',                 method: 'GET',  path: '/api/orders' },
    { label: 'GET  /api/reports/summary',        method: 'GET',  path: '/api/reports/summary' },
    { label: 'GET  /api/customers/1/orders',     method: 'GET',  path: '/api/customers/1/orders' },
    { label: 'POST /api/orders',                 method: 'POST', path: '/api/orders' },
    { label: 'Custom…', method: 'GET', path: null },
  ],
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function dotHtml(status) {
  const cls = ['Running','Stopped','NotFound'].includes(status)
    ? `dot-${status}` : 'dot-other';
  return `<span class="status-dot ${cls}"></span>${status}`;
}

function cardHtml(s) {
  const emoji   = EMOJI[s.instanceName] ?? '🔌';
  const n       = s.instanceName;
  const rid     = `r-${n}`;
  const esc     = v => v.replace(/"/g, '&quot;');
  const presets = PRESETS[n] ?? null;
  const getOnly = n === 'OpenMeteo'; // GET-only upstream API

  // Preset dropdown — only for services with a known endpoint list
  const presetRow = presets ? `
      <select id="preset-${n}" class="form-select form-select-sm font-monospace"
              style="background-color:#0d1117;border-color:#30363d;color:#e6edf3"
              onchange="applyPreset('${n}')">
        ${presets.map(o => `<option value="${esc(o.path ?? '')}|${o.method}">${esc(o.label)}</option>`).join('')}
      </select>` : '';

  // Method selector — fixed GET label for OpenMeteo, GET/POST dropdown for others
  const methodCtrl = getOnly
    ? `<span class="input-group-text font-monospace"
             style="background-color:#0d1117;border-color:#30363d;color:#6e7681;min-width:70px;justify-content:center;font-size:.8rem">GET</span>`
    : `<select id="method-${n}" class="form-select font-monospace"
               style="max-width:80px;background-color:#0d1117;border-color:#30363d;color:#e6edf3;font-size:.8rem"
               onchange="toggleBody('${n}')">
         <option>GET</option><option>POST</option>
       </select>`;

  // Path input is read-only when a named preset is active; editable for Custom
  const readOnly = presets && presets[0].path ? 'readonly style="background-color:#0d1117;border-color:#30363d;color:#8b949e"'
                                               : 'style="background-color:#0d1117;border-color:#30363d;color:#e6edf3"';

  return `
<div class="col-12 col-sm-6 col-lg-3">
  <div class="card h-100">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-semibold">${emoji} ${n}</span>
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-link btn-sm p-0 text-success" title="Start"
                onclick="doControl(this,'${n}','start')">
          <i class="bi bi-play-fill"></i>
        </button>
        <button class="btn btn-link btn-sm p-0 text-danger" title="Stop"
                onclick="doControl(this,'${n}','stop')">
          <i class="bi bi-stop-fill"></i>
        </button>
        <small id="status-${n}">${dotHtml(s.status)}</small>
      </div>
    </div>
    <div class="card-body d-flex flex-column gap-2">
      <p class="mb-0 small text-muted">
        <i class="bi bi-box-arrow-up-right me-1"></i><code>${s.proxyUrl}</code>
        &nbsp;<span class="opacity-50">→</span>&nbsp;
        <i class="bi bi-hdd-network me-1"></i>localhost:<strong>${s.port}</strong>
      </p>
      <p class="mb-1 small text-secondary flex-grow-1">${s.serviceDescription}</p>
      ${presetRow}
      <div class="input-group input-group-sm">
        ${methodCtrl}
        <input id="path-${n}" type="text"
               class="form-control font-monospace"
               ${readOnly}
               value="${esc(s.testPath)}"
               placeholder="/"
               onkeydown="if(event.key==='Enter')doTest('${n}')" />
        <button class="btn btn-primary btn-sm" onclick="doTest('${n}')">
          <i class="bi bi-send"></i>
        </button>
      </div>
      <div id="body-wrap-${n}" class="d-none">
        <textarea id="body-${n}" rows="3" class="form-control form-control-sm font-monospace"
                  style="background-color:#0d1117;border-color:#30363d;color:#e6edf3"
                  placeholder='{"key": "value"}'></textarea>
      </div>
    </div>
    <div id="${rid}" class="d-none">
      <div class="card-footer">
        <pre id="${rid}-pre" class="response mb-0 text-success"></pre>
      </div>
    </div>
  </div>
</div>`;
}

// ── Custom card (rendered once, never overwritten by refresh) ─────────────────
function customCardHtml() {
  return `
<div class="col-12">
  <div class="card">
    <div class="card-header d-flex align-items-center gap-2">
      <span class="fw-semibold">URL</span>
      <small class="text-muted">send a request to any address</small>
    </div>
    <div class="card-body d-flex flex-column gap-2">
      <div class="input-group">
        <select id="custom-method" class="form-select font-monospace"
                style="max-width:90px;background-color:#0d1117;border-color:#30363d;color:#e6edf3"
                onchange="document.getElementById('custom-body-wrap').classList.toggle('d-none',this.value!=='POST')">
          <option>GET</option>
          <option>POST</option>
        </select>
        <input id="custom-url" type="text" class="form-control font-monospace"
               style="background-color:#0d1117;border-color:#30363d;color:#e6edf3"
               placeholder="https://api.example.com/endpoint"
               onkeydown="if(event.key==='Enter')doCustomTest()" />
        <button class="btn btn-warning" onclick="doCustomTest()">
          <i class="bi bi-send"></i>
        </button>
      </div>
      <div id="custom-body-wrap" class="d-none">
        <textarea id="custom-body" rows="3" class="form-control form-control-sm font-monospace"
                  style="background-color:#0d1117;border-color:#30363d;color:#e6edf3"
                  placeholder='{"key": "value"}'></textarea>
      </div>
    </div>
    <div id="r-custom" class="d-none">
      <div class="card-footer">
        <pre id="r-custom-pre" class="response mb-0 text-success"></pre>
      </div>
    </div>
  </div>
</div>`;
}

// ── Preset / method helpers ───────────────────────────────────────────────────
function toggleBody(name) {
  const method = document.getElementById(`method-${name}`)?.value ?? 'GET';
  document.getElementById(`body-wrap-${name}`)?.classList.toggle('d-none', method !== 'POST');
}

// Body hints for specific POST presets — keyed by "name|path"
const BODY_HINTS = {
  'SqlService|/api/orders': '{"customerId": 1, "productId": 1, "quantity": 1}',
  'JsonPlaceholder|/posts': '{"title": "hello", "body": "world", "userId": 1}',
};

function applyPreset(name) {
  const sel = document.getElementById(`preset-${name}`);
  if (!sel) return;
  const [path, method] = sel.value.split('|');
  const pathEl   = document.getElementById(`path-${name}`);
  const methodEl = document.getElementById(`method-${name}`);
  const bodyEl   = document.getElementById(`body-${name}`);
  const isCustom = !path;

  pathEl.value    = isCustom ? '' : path;
  pathEl.readOnly = !isCustom;
  pathEl.style.color = isCustom ? '#e6edf3' : '#8b949e';

  if (methodEl) {
    methodEl.value = method || 'GET';
    toggleBody(name);
  }

  if (bodyEl && method === 'POST' && path) {
    const hint = BODY_HINTS[`${name}|${path}`];
    if (hint) bodyEl.value = hint;
  }
}

// ── API ───────────────────────────────────────────────────────────────────────
async function doCustomTest() {
  const url    = document.getElementById('custom-url')?.value.trim();
  const method = document.getElementById('custom-method')?.value ?? 'GET';
  const body   = document.getElementById('custom-body')?.value ?? '';
  const pre    = document.getElementById('r-custom-pre');

  if (!url) {
    document.getElementById('r-custom').classList.remove('d-none');
    pre.className   = 'response mb-0 text-danger';
    pre.textContent = '❌ Please enter a URL.';
    return;
  }

  document.getElementById('r-custom').classList.remove('d-none');
  pre.className   = 'response mb-0 text-muted';
  pre.textContent = '⏳ Sending request…';

  try {
    const r    = await fetch('/api/custom-request', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ url, method, body: method === 'POST' ? body : null }),
    });
    const data = await r.json();
    if (data.error) {
      pre.className   = 'response mb-0 text-danger';
      pre.textContent = `❌ ${data.error}\n\nURL: ${data.url}`;
    } else {
      pre.className   = 'response mb-0 text-success';
      pre.textContent = `✅ HTTP ${data.statusCode}  [${data.method}]  ${data.url}\n\n${JSON.stringify(data.body, null, 2)}`;
    }
  } catch (e) {
    pre.className   = 'response mb-0 text-danger';
    pre.textContent = `❌ ${e.message}`;
  }
}

async function doTest(name) {
  const rid    = `r-${name}`;
  const pre    = document.getElementById(`${rid}-pre`);
  const path   = document.getElementById(`path-${name}`)?.value.trim() || '/';
  const method = document.getElementById(`method-${name}`)?.value ?? 'GET';
  const body   = document.getElementById(`body-${name}`)?.value ?? '';
  document.getElementById(rid).classList.remove('d-none');
  pre.className   = 'response mb-0 text-muted';
  pre.textContent = '⏳ Sending request…';

  try {
    const r    = await fetch(`/api/services/${name}/test`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ path, method, body: method === 'POST' ? body : null }),
    });
    const data = await r.json();
    if (data.error) {
      pre.className   = 'response mb-0 text-danger';
      pre.textContent = `❌ ${data.error}\n\nURL: ${data.url ?? ''}`;
    } else {
      pre.className   = 'response mb-0 text-success';
      pre.textContent = `✅ HTTP ${data.statusCode}  [${data.method ?? method}]  ${data.url}\n\n${JSON.stringify(data.body, null, 2)}`;
    }
  } catch (e) {
    pre.className   = 'response mb-0 text-danger';
    pre.textContent = `❌ ${e.message}`;
  }
}

async function doControl(btn, name, action) {
  btn.disabled = true;
  console.log(`[control] ${action} → ${name}`);
  try {
    const r = await fetch(`/api/services/${name}/${action}`, { method: 'POST' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      const msg = err.title ?? err.detail ?? JSON.stringify(err);
      console.error(`[control] ${action} ${name} failed (HTTP ${r.status}):`, err);
      alert(`Failed to ${action} ${name}:\n${msg}`);
    } else {
      const data = await r.json().catch(() => ({}));
      console.log(`[control] ${action} ${name} →`, data);
    }
    await refresh();
  } catch (e) {
    console.error(`[control] ${action} ${name} exception:`, e);
    alert(`${action} ${name}: ${e.message}`);
  } finally {
    btn.disabled = false;
  }
}

// ── Polling ───────────────────────────────────────────────────────────────────
let firstRender = true;

async function refresh() {
  try {
    const r = await fetch('/api/services');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const services = await r.json();

    if (firstRender) {
      document.getElementById('grid').innerHTML =
        services.map(cardHtml).join('') +
        `<div class="col-12"><hr style="border-color:#30363d;margin:0.25rem 0" />
           <small class="text-muted"><i class="bi bi-globe2 me-1"></i>Custom Request</small></div>` +
        customCardHtml();
      firstRender = false;
    } else {
      // Patch status badges only — keeps test response panels intact
      for (const s of services) {
        const el = document.getElementById(`status-${s.instanceName}`);
        if (el) el.innerHTML = dotHtml(s.status);
      }
    }

    const running = services.filter(s => s.status === 'Running').length;
    document.getElementById('summary').textContent =
      `${running} / ${services.length} running`;
    document.getElementById('last-updated').textContent =
      `Refreshed ${new Date().toLocaleTimeString()}`;

  } catch (e) {
    if (firstRender) {
      document.getElementById('grid').innerHTML = `
        <div class="col-12">
          <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle me-2"></i>
            Could not reach dashboard API: ${e.message}
          </div>
        </div>`;
    }
  }
}

refresh();
setInterval(refresh, POLL_MS);

// ── Datadog RUM ───────────────────────────────────────────────────────────────
// Config is served from /rum-config.json.
// RUM is silently skipped if applicationId is absent or empty.
// The file is populated by the MSI installer dialog (via registry) or by
// writing it directly (CI secrets injection / manual edit).
(function () {
  // Maps the Datadog site value to its CDN path segment.
  const SITE_CDN = {
    'datadoghq.com':     'us1',
    'us3.datadoghq.com': 'us3',
    'us5.datadoghq.com': 'us5',
    'datadoghq.eu':      'eu1',
    'ap1.datadoghq.com': 'ap1',
    'ddog-gov.com':      'fed',
  };

  fetch('/rum-config.json')
    .then(r => r.ok ? r.json() : null)
    .then(cfg => {
      if (!cfg?.applicationId || !cfg?.clientToken) return;
      const cdn = SITE_CDN[cfg.site] ?? 'us1';
      (function (h, o, u, n, d) {
        h = h[d] = h[d] || { q: [], onReady: function (c) { h.q.push(c) } };
        d = o.createElement(u); d.async = 1;
        d.src = `https://www.datadoghq-browser-agent.com/${cdn}/v6/datadog-rum.js`;
        d.crossOrigin = '';
        n = o.getElementsByTagName(u)[0]; n.parentNode.insertBefore(d, n);
      })(window, document, 'script', null, 'DD_RUM');

      window.DD_RUM.onReady(function () {
        window.DD_RUM.init({
          applicationId:           cfg.applicationId,
          clientToken:             cfg.clientToken,
          site:                    cfg.site,
          service:                 cfg.service                 || 'windows-proxy-services-ui',
          env:                     cfg.env                     || '',
          version:                 cfg.version                 || '',
          sessionSampleRate:       cfg.sessionSampleRate       ?? 100,
          sessionReplaySampleRate: cfg.sessionReplaySampleRate ?? 20,
          trackResources:          true,
          trackUserInteractions:   true,
          trackLongTasks:          true,
          allowedTracingUrls:      cfg.allowedTracingUrls      ?? ['http://localhost'],
        });
      });
    })
    .catch(() => { /* non-fatal — RUM is optional */ });
}());
</script>
</body>
</html>
