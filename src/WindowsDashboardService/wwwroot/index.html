<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Windows Proxy Services</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body         { background: #0d1117; }
    .card        { border-color: #30363d; background: #161b22; }
    .card-header { border-color: #30363d; background: #1c2128; }
    .card-footer { border-color: #30363d; background: #0d1117; }
    pre.response {
      max-height: 260px;
      overflow-y: auto;
      font-size: .78rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .dot-Running  { background: #3fb950; box-shadow: 0 0 5px #3fb950; }
    .dot-Stopped  { background: #f85149; }
    .dot-NotFound { background: #6e7681; }
    .dot-other    { background: #d29922; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar" style="background:#161b22;border-bottom:1px solid #30363d">
  <div class="container-fluid px-4">
    <span class="navbar-brand fw-semibold mb-0">
      <i class="bi bi-router me-2 text-primary"></i>Windows Proxy Services
    </span>
    <div class="d-flex align-items-center gap-3">
      <small id="summary" class="text-muted"></small>
      <small id="last-updated" class="text-muted"></small>
    </div>
  </div>
</nav>

<!-- Cards -->
<div class="container-fluid py-4 px-4">
  <div id="grid" class="row g-3">
    <div class="col-12 text-center py-5">
      <i class="bi bi-arrow-repeat spin fs-3 text-primary d-block mb-3"></i>
      <span class="text-muted">Loading services…</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const POLL_MS = 5000;
const EMOJI   = {
  OpenMeteo: '🌤', CatFacts: '🐱', JsonPlaceholder: '📋',
  DogCeo: '🐶', ChuckNorris: '💪',
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function dotHtml(status) {
  const cls = ['Running','Stopped','NotFound'].includes(status)
    ? `dot-${status}` : 'dot-other';
  return `<span class="status-dot ${cls}"></span>${status}`;
}

function cardHtml(s) {
  const emoji = EMOJI[s.instanceName] ?? '🔌';
  const rid   = `r-${s.instanceName}`;
  return `
<div class="col-12 col-md-6 col-xxl-4">
  <div class="card h-100">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-semibold">${emoji} ${s.instanceName}</span>
      <small id="status-${s.instanceName}">${dotHtml(s.status)}</small>
    </div>
    <div class="card-body d-flex flex-column gap-2">
      <p class="mb-0 small text-muted">
        <i class="bi bi-box-arrow-up-right me-1"></i><code>${s.proxyUrl}</code>
      </p>
      <p class="mb-0 small text-muted">
        <i class="bi bi-hdd-network me-1"></i>localhost:<strong>${s.port}</strong>
        &nbsp;<span class="text-muted opacity-50">•</span>&nbsp;
        <code class="text-muted opacity-75">${s.testPath}</code>
      </p>
      <p class="mb-2 small text-secondary flex-grow-1">${s.serviceDescription}</p>
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-sm btn-primary"
                onclick="doTest('${s.instanceName}')">
          <i class="bi bi-send me-1"></i>Test
        </button>
        <button class="btn btn-sm btn-outline-success" title="Start service"
                onclick="doControl(this,'${s.instanceName}','start')">
          <i class="bi bi-play-fill"></i>
        </button>
        <button class="btn btn-sm btn-outline-danger" title="Stop service"
                onclick="doControl(this,'${s.instanceName}','stop')">
          <i class="bi bi-stop-fill"></i>
        </button>
      </div>
    </div>
    <div id="${rid}" class="d-none">
      <div class="card-footer">
        <pre id="${rid}-pre" class="response mb-0 text-success"></pre>
      </div>
    </div>
  </div>
</div>`;
}

// ── API ───────────────────────────────────────────────────────────────────────
async function doTest(name) {
  const rid = `r-${name}`;
  const pre = document.getElementById(`${rid}-pre`);
  document.getElementById(rid).classList.remove('d-none');
  pre.className   = 'response mb-0 text-muted';
  pre.textContent = '⏳ Sending request…';

  try {
    const r    = await fetch(`/api/services/${name}/test`, { method: 'POST' });
    const data = await r.json();
    if (data.error) {
      pre.className   = 'response mb-0 text-danger';
      pre.textContent = `❌ ${data.error}\n\nURL: ${data.url}`;
    } else {
      pre.className   = 'response mb-0 text-success';
      pre.textContent = `✅ HTTP ${data.statusCode}  ${data.url}\n\n${JSON.stringify(data.body, null, 2)}`;
    }
  } catch (e) {
    pre.className   = 'response mb-0 text-danger';
    pre.textContent = `❌ ${e.message}`;
  }
}

async function doControl(btn, name, action) {
  btn.disabled = true;
  try {
    const r = await fetch(`/api/services/${name}/${action}`, { method: 'POST' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      alert(`Failed to ${action} ${name}:\n${err.title ?? err.detail ?? JSON.stringify(err)}`);
    }
    await refresh();
  } catch (e) {
    alert(`${action} ${name}: ${e.message}`);
  } finally {
    btn.disabled = false;
  }
}

// ── Polling ───────────────────────────────────────────────────────────────────
let firstRender = true;

async function refresh() {
  try {
    const r = await fetch('/api/services');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const services = await r.json();

    if (firstRender) {
      document.getElementById('grid').innerHTML = services.map(cardHtml).join('');
      firstRender = false;
    } else {
      // Patch status badges only — keeps test response panels intact
      for (const s of services) {
        const el = document.getElementById(`status-${s.instanceName}`);
        if (el) el.innerHTML = dotHtml(s.status);
      }
    }

    const running = services.filter(s => s.status === 'Running').length;
    document.getElementById('summary').textContent =
      `${running} / ${services.length} running`;
    document.getElementById('last-updated').textContent =
      `Refreshed ${new Date().toLocaleTimeString()}`;

  } catch (e) {
    if (firstRender) {
      document.getElementById('grid').innerHTML = `
        <div class="col-12">
          <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle me-2"></i>
            Could not reach dashboard API: ${e.message}
          </div>
        </div>`;
    }
  }
}

refresh();
setInterval(refresh, POLL_MS);
</script>
</body>
</html>
